name: Deploy All Instances

on:
  workflow_run:
    workflows: ["Publish Docker Images"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: deploy-all-instances
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      )
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_USER"
          test -n "$DEPLOY_SSH_KEY"
          CLEAN_HOST="${DEPLOY_HOST#http://}"
          CLEAN_HOST="${CLEAN_HOST#https://}"
          CLEAN_HOST="${CLEAN_HOST%%/*}"
          test -n "$CLEAN_HOST"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$CLEAN_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          {
            echo "Host production"
            echo "  HostName $CLEAN_HOST"
            echo "  User $DEPLOY_USER"
            echo "  IdentityFile ~/.ssh/deploy_key"
            echo "  IdentitiesOnly yes"
            echo "  StrictHostKeyChecking accept-new"
          } > ~/.ssh/config

      - name: Preflight check all instances
        run: |
          set -euo pipefail
          ssh production <<'EOF'
          set -euo pipefail

          echo "Discovering live frontend instances..."
          mapfile -t FRONTENDS < <(sudo -n docker ps \
            --filter "label=com.docker.compose.service=frontend" \
            --format '{{.Names}}')
          if [ "${#FRONTENDS[@]}" -eq 0 ]; then
            echo "No frontend instances discovered." >&2
            exit 1
          fi
          printf 'Frontends: %s\n' "${FRONTENDS[@]}"

          echo "Discovering live backend instances..."
          mapfile -t BACKENDS < <(sudo -n docker ps \
            --filter "label=com.docker.compose.service=backend" \
            --format '{{.Names}}')
          if [ "${#BACKENDS[@]}" -eq 0 ]; then
            echo "No backend instances discovered." >&2
            exit 1
          fi
          printf 'Backends: %s\n' "${BACKENDS[@]}"

          echo "Checking each frontend host port..."
          for c in "${FRONTENDS[@]}"; do
            port="$(sudo -n docker port "$c" 80/tcp | awk -F: 'NR==1{print $NF}')"
            [ -n "$port" ]
            url="http://127.0.0.1:${port}/"
            code="$(curl -sS -o /dev/null -w '%{http_code}' --max-time 15 "$url")"
            echo "$c -> $url -> HTTP $code"
            [ "$code" -ge 200 ] && [ "$code" -lt 400 ]
          done

          echo "Checking each backend health endpoint..."
          for c in "${BACKENDS[@]}"; do
            port="$(sudo -n docker port "$c" 5000/tcp | awk -F: 'NR==1{print $NF}')"
            [ -n "$port" ]
            url="http://127.0.0.1:${port}/api/health"
            body="$(curl -sS --max-time 15 "$url")"
            echo "$c -> $url -> $body"
            echo "$body" | grep -q '"success":true'
          done
          EOF

      - name: Deploy all live instances
        env:
          SERVER_HOST: production
          SERVER_USER: ${{ secrets.DEPLOY_USER }}
        run: bash scripts/deploy-server.sh
