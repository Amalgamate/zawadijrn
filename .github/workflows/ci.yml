name: Trends CORE V1.0 CI Pipeline
on: [push, pull_request]
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build Frontend
        run: npm install && npm run build
      - name: Verify Backend
        working-directory: ./server
        run: npm install && npx prisma generate && npx tsc --noEmit
